name: Notification CI/CD Pipeline

on:
  push:
    branches: [master]
    paths:
      - 'apps/services/notification/**'
      - 'packages/contracts/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate Notification
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://notification:notification@localhost:5432/notification
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      RABBITMQ_URL: amqp://guest:guest@localhost:5672
      RABBITMQ_EXCHANGE: uitfood.domain-events
      INTERNAL_AUTH_JWT_SECRET: internal_auth_secret_for_local_dev_only_32_chars
      INTERNAL_AUTH_TRUSTED_ISSUERS: uitfood-gateway
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: notification
          POSTGRES_PASSWORD: notification
          POSTGRES_DB: notification
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      rabbitmq:
        image: rabbitmq:3.13-management-alpine
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Code (Checkout)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Environment
        uses: ./.github/actions/setup-environment

      - name: Check (Lint & Typecheck)
        run: pnpm turbo run lint typecheck --filter=notification

      - name: Build
        run: pnpm turbo run build --filter=notification

      - name: Migrate Notification Database
        run: pnpm --filter=notification run db:migrate

  publish:
    name: Publish Notification Docker Image
    needs: validate
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/cd-package-docker.yml
    with:
      app: notification
      dockerfile_path: apps/services/notification/Dockerfile
      gh_actor: ${{ github.actor }}
      gh_repository: ${{ github.repository }}
    secrets: inherit

  deploy-render:
    name: Deploy Notification Image to Render
    needs: publish
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: read
    uses: ./.github/workflows/cd-render-image.yml
    with:
      app: notification
      gh_repository: ${{ github.repository }}
    secrets:
      RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_NOTIFICATION_DEPLOY_HOOK }}
