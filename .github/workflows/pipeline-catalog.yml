name: Catalog CI/CD Pipeline

on:
  push:
    branches: [master]
    paths:
      - 'apps/services/catalog/**'
      - 'packages/contracts/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate Catalog
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://catalog:catalog@localhost:5432/catalog
      RABBITMQ_URL: amqp://guest:guest@localhost:5672
      RABBITMQ_EXCHANGE: uitfood.domain-events
      INTERNAL_AUTH_JWT_SECRET: internal_auth_secret_for_local_dev_only_32_chars
      INTERNAL_AUTH_TRUSTED_ISSUERS: uitfood-gateway,uitfood-api
      INTERNAL_AUTH_JWT_ISSUER: uitfood-catalog
    services:
      postgres:
        # pgvector image: the Catalog DB owns the AI-search vector columns + the
        # unaccent / pg_trgm extensions the migration creates.
        image: pgvector/pgvector:0.8.2-pg18-trixie
        env:
          POSTGRES_USER: catalog
          POSTGRES_PASSWORD: catalog
          POSTGRES_DB: catalog
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:3.13-management-alpine
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Code (Checkout)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Environment
        uses: ./.github/actions/setup-environment

      - name: Check (Lint & Typecheck)
        run: pnpm turbo run lint typecheck --filter=catalog

      - name: Unit Test
        run: pnpm --filter=catalog run test

      - name: Build
        run: pnpm turbo run build --filter=catalog

      - name: Migrate Catalog Database
        run: pnpm --filter=catalog run db:migrate

      - name: Test (TCP + Postgres E2E)
        run: pnpm --filter=catalog run test:e2e

  publish:
    name: Publish Catalog Docker Image
    needs: validate
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/cd-package-docker.yml
    with:
      app: catalog
      dockerfile_path: apps/services/catalog/Dockerfile
      gh_actor: ${{ github.actor }}
      gh_repository: ${{ github.repository }}
    secrets: inherit

  deploy-render:
    name: Deploy Catalog Image to Render
    needs: publish
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: read
    uses: ./.github/workflows/cd-render-image.yml
    with:
      app: catalog
      gh_repository: ${{ github.repository }}
    secrets:
      RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_CATALOG_DEPLOY_HOOK }}
