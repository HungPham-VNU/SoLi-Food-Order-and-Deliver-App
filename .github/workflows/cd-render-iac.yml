name: CD Render IaC

on:
  workflow_call:
    inputs:
      apply:
        required: false
        type: boolean
        default: false
      image_tag:
        required: false
        type: string
        default: ''
      use_github_sha_tag:
        required: false
        type: boolean
        default: false
  pull_request:
    paths:
      - 'infra/render/**'
      - '.github/workflows/cd-render-iac.yml'
  push:
    branches:
      - master
    paths:
      - 'infra/render/**'
      - '.github/workflows/cd-render-iac.yml'
  workflow_dispatch:
    inputs:
      apply:
        description: Apply the generated Terraform plan.
        required: false
        type: boolean
        default: false
      image_tag:
        description: Docker image tag to apply to Render services.
        required: false
        type: string
        default: ''
      use_github_sha_tag:
        description: Use sha-<short commit sha> as the Docker image tag.
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: render-iac-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: 'true'
  TF_INPUT: 'false'
  RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
  RENDER_OWNER_ID: ${{ secrets.RENDER_OWNER_ID }}
  TF_VAR_api_env_vars: ${{ secrets.RENDER_API_ENV_VARS_JSON }}
  TF_VAR_render_environment_id: ${{ vars.RENDER_ENVIRONMENT_ID }}
  DEFAULT_RENDER_IMAGE_TAG: ${{ vars.RENDER_IMAGE_TAG || 'sha-05beb43' }}

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/render

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check backend configuration
        id: backend
        shell: bash
        run: |
          if [ -f backend.tf ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Skipping plan/apply because infra/render/backend.tf is not configured."
          fi

      - name: Resolve Docker image tag
        shell: bash
        env:
          INPUT_IMAGE_TAG: ${{ inputs.image_tag || '' }}
          USE_GITHUB_SHA_TAG: ${{ inputs.use_github_sha_tag || false }}
        run: |
          set -euo pipefail

          if [ -n "${INPUT_IMAGE_TAG}" ]; then
            image_tag="${INPUT_IMAGE_TAG}"
          elif [ "${USE_GITHUB_SHA_TAG}" = "true" ]; then
            image_tag="sha-${GITHUB_SHA:0:7}"
          else
            image_tag="${DEFAULT_RENDER_IMAGE_TAG}"
          fi

          echo "TF_VAR_image_tag=${image_tag}" >> "$GITHUB_ENV"
          echo "Using Render image tag: ${image_tag}"

      - name: Terraform init
        run: terraform init -backend=${{ steps.backend.outputs.configured }}

      - name: Terraform plan
        if: steps.backend.outputs.configured == 'true'
        run: terraform plan -out=tfplan

      - name: Terraform apply
        if: steps.backend.outputs.configured == 'true' && ((github.event_name == 'push' && github.ref == 'refs/heads/master') || inputs.apply == true)
        run: terraform apply -auto-approve tfplan
