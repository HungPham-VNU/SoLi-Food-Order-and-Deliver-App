name: CI/CD Pipeline

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    uses: ./.github/workflows/validate.yml
    secrets: inherit

  publish-api-docker:
    name: Publish API Docker Image
    needs: validate
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/publish-docker.yml
    with:
      app: api
      gh_actor: ${{ github.actor }}
      gh_repository: ${{ github.repository }}
    secrets: inherit

  publish-web-docker:
    name: Publish Web Docker Image
    needs: validate
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/publish-docker.yml
    with:
      app: web
      gh_actor: ${{ github.actor }}
      gh_repository: ${{ github.repository }}
      vite_api_base_url: ${{ vars.VITE_API_BASE_URL }}
    secrets: inherit

  deploy-api-render:
    name: Deploy API to Render
    needs: publish-api-docker
    if: github.ref == 'refs/heads/master'
    uses: ./.github/workflows/deploy-render.yml
    with:
      app: api
      gh_repository: ${{ github.repository }}
    secrets:
      deploy_hook: ${{ secrets.RENDER_API_DEPLOY_HOOK }}

  deploy-web-render:
    name: Deploy Web to Render
    needs: publish-web-docker
    if: github.ref == 'refs/heads/master'
    uses: ./.github/workflows/deploy-render.yml
    with:
      app: web
      gh_repository: ${{ github.repository }}
    secrets:
      deploy_hook: ${{ secrets.RENDER_WEB_DEPLOY_HOOK }}

  publish-mobile:
    needs: validate
    uses: ./.github/workflows/publish-mobile.yml
    secrets:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
