# Development docker-compose — starts all local services + app dev servers with hot reload.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up --build
#
#
# After changing package.json or pnpm-lock.yaml, rebuild and reset volumes:
#   docker compose -f docker-compose.dev.yml down -v
#   docker compose -f docker-compose.dev.yml up --build
#
# Access:
#   API   → http://localhost:3000
#   Web   → http://localhost:5173
#   Admin → http://localhost:5174

services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg18-trixie
    container_name: uitfoodms_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-uitfoodms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uitfoodmssecret}
      POSTGRES_DB: ${POSTGRES_DB:-uitfoodms}
    ports:
      - '5432:5432'
    volumes:
      - uitfoodms_db:/var/lib/postgresql
      - ./infra/postgres/init-test-db.sql:/docker-entrypoint-initdb.d/01-init-test-db.sql:ro
    healthcheck:
      # $$VAR is expanded by the container shell, not by Compose.
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: uitfoodms_redis
    ports:
      - '6379:6379'
    volumes:
      - uitfoodms_redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning

  notification-redis:
    image: redis:7-alpine
    container_name: uitfoodms_notification_redis
    ports:
      - '6380:6379'
    volumes:
      - uitfoodms_notification_redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: uitfoodms_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    ports:
      - '5672:5672'
      - '15672:15672'
    volumes:
      - uitfoodms_rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: uitfoodms_api_dev
    volumes:
      - .:/app
      # Named volumes shadow the bind-mount for node_modules so the
      # Docker-installed packages aren't overwritten by the host directory.
      - api_nm_root:/app/node_modules
      - api_nm_app:/app/apps/api/node_modules
    environment:
      # Override localhost references so the API reaches the compose services.
      DATABASE_URL: postgresql://uitfood_api:api_secret@postgres:5432/${POSTGRES_DB:-uitfoodms}
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672${RABBITMQ_VHOST:+/}${RABBITMQ_VHOST:-}
      RABBITMQ_EXCHANGE: uitfood.domain-events
      MEDIA_TCP_HOST: media
      MEDIA_TCP_PORT: 4001
      MEDIA_RPC_REQUIRED: 'true'
      IDENTITY_TCP_HOST: identity
      IDENTITY_TCP_PORT: 4011
      IDENTITY_RPC_ENABLED: 'true'
      IDENTITY_RPC_REQUIRED: 'true'
      LEGACY_NOTIFICATION_ROUTES_ENABLED: 'false'
      LEGACY_NOTIFICATION_RUNTIME_ENABLED: 'false'
      INTERNAL_AUTH_JWT_SECRET: ${INTERNAL_AUTH_JWT_SECRET:-internal_auth_secret_for_local_dev_only_32_chars}
      INTERNAL_AUTH_JWT_ISSUER: uitfood-api
      LEGACY_MEDIA_ROUTES_ENABLED: 'true'
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-https://ollama.com}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gpt-oss:20b}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      AI_SEARCH_EMBEDDING_BASE_URL: ${AI_SEARCH_EMBEDDING_BASE_URL:-http://host.docker.internal:11434}
      # Enable polling-based file watching for reliable hot-reload inside Docker
      # on macOS/Windows (Docker Desktop bind mounts don't emit inotify events).
      CHOKIDAR_USEPOLLING: 'true'
    ports:
      - '3000:3000'
    command: sh -c "pnpm --filter @uitfood/contracts build && pnpm --filter api run dev"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      media:
        condition: service_started
      identity:
        condition: service_started
      notification:
        condition: service_started
    restart: unless-stopped

  identity:
    build:
      context: .
      dockerfile: apps/services/identity/Dockerfile.dev
    container_name: uitfoodms_identity_dev
    volumes:
      - .:/app
      - identity_nm_root:/app/node_modules
      - identity_nm_app:/app/apps/services/identity/node_modules
    environment:
      DATABASE_URL: postgresql://uitfood_identity:identity_secret@postgres:5432/uitfood_identity
      IDENTITY_TCP_PORT: 4011
      IDENTITY_MANAGEMENT_PORT: 4012
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-a_very_long_secret_for_test_purposes_only_32_chars}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:8080}
      CHOKIDAR_USEPOLLING: 'true'
    command: sh -c "pnpm --filter @uitfood/contracts build && pnpm run db:migrate && pnpm run dev"
    ports:
      - '4011:4011'
      - '4012:4012'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  media:
    build:
      context: .
      dockerfile: apps/services/media/Dockerfile.dev
    container_name: uitfoodms_media_dev
    volumes:
      - .:/app
      - media_nm_root:/app/node_modules
      - media_nm_app:/app/apps/services/media/node_modules
    environment:
      DATABASE_URL: postgresql://uitfood_media:media_secret@postgres:5432/uitfood_media
      MEDIA_TCP_PORT: 4001
      MEDIA_MANAGEMENT_PORT: 4002
      INTERNAL_AUTH_JWT_SECRET: ${INTERNAL_AUTH_JWT_SECRET:-internal_auth_secret_for_local_dev_only_32_chars}
      INTERNAL_AUTH_TRUSTED_ISSUERS: uitfood-gateway,uitfood-api
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-STUB_CLOUD}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-STUB_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-STUB_SECRET}
      CHOKIDAR_USEPOLLING: 'true'
    command: sh -c "pnpm --filter @uitfood/contracts build && pnpm run db:migrate && pnpm run dev"
    ports:
      - '4001:4001'
      - '4002:4002'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  notification:
    build:
      context: .
      dockerfile: apps/services/notification/Dockerfile.dev
    container_name: uitfoodms_notification_dev
    volumes:
      - .:/app
      - notification_nm_root:/app/node_modules
      - notification_nm_app:/app/apps/services/notification/node_modules
    environment:
      DATABASE_URL: postgresql://uitfood_notification:notification_secret@postgres:5432/uitfood_notification
      REDIS_URL: redis://notification-redis:6379
      REDIS_HOST: notification-redis
      REDIS_PORT: 6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672${RABBITMQ_VHOST:+/}${RABBITMQ_VHOST:-}
      RABBITMQ_EXCHANGE: uitfood.domain-events
      NOTIFICATION_TCP_PORT: 4021
      NOTIFICATION_MANAGEMENT_PORT: 4022
      IDENTITY_TCP_HOST: identity
      IDENTITY_TCP_PORT: 4011
      INTERNAL_AUTH_JWT_SECRET: ${INTERNAL_AUTH_JWT_SECRET:-internal_auth_secret_for_local_dev_only_32_chars}
      INTERNAL_AUTH_TRUSTED_ISSUERS: uitfood-gateway
      CORS_ORIGIN: http://localhost:5173,http://localhost:5174
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@soli.dev}
      FIREBASE_SERVICE_ACCOUNT_PATH: ${FIREBASE_SERVICE_ACCOUNT_PATH:-}
      CHOKIDAR_USEPOLLING: 'true'
    command: sh -c "pnpm --filter @uitfood/contracts build && pnpm run db:migrate && pnpm run dev"
    ports:
      - '4021:4021'
      - '4022:4022'
    depends_on:
      postgres:
        condition: service_healthy
      notification-redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      identity:
        condition: service_started
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile.dev
    container_name: uitfoodms_gateway_dev
    volumes:
      - .:/app
      - gateway_nm_root:/app/node_modules
      - gateway_nm_app:/app/apps/gateway/node_modules
    environment:
      PORT: 8080
      MONOLITH_UPSTREAM_URL: http://api:3000
      MEDIA_ROUTES_ENABLED: 'true'
      MEDIA_TCP_HOST: media
      MEDIA_TCP_PORT: 4001
      IDENTITY_ROUTES_ENABLED: 'true'
      IDENTITY_TCP_HOST: identity
      IDENTITY_TCP_PORT: 4011
      IDENTITY_MANAGEMENT_PORT: 4012
      NOTIFICATION_ROUTES_ENABLED: 'true'
      NOTIFICATION_TCP_HOST: notification
      NOTIFICATION_TCP_PORT: 4021
      NOTIFICATION_MANAGEMENT_PORT: 4022
      INTERNAL_AUTH_JWT_SECRET: ${INTERNAL_AUTH_JWT_SECRET:-internal_auth_secret_for_local_dev_only_32_chars}
      INTERNAL_AUTH_JWT_ISSUER: uitfood-gateway
      CHOKIDAR_USEPOLLING: 'true'
    ports:
      - '8080:8080'
    command: sh -c "pnpm --filter @uitfood/contracts build && pnpm run dev"
    depends_on:
      - api
      - media
      - identity
      - notification
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    container_name: uitfoodms_web_dev
    volumes:
      - .:/app
      - web_nm_root:/app/node_modules
      - web_nm_app:/app/apps/web/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    # VITE_API_BASE_URL stays at localhost:3000 — the browser talks to the
    # published host port, not the internal Docker network.
    ports:
      - '5173:5173'
    depends_on:
      - gateway
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile.dev
    container_name: uitfoodms_admin_dev
    volumes:
      - .:/app
      - admin_nm_root:/app/node_modules
      - admin_nm_app:/app/apps/admin/node_modules
    ports:
      - '5174:5174'
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    depends_on:
      - gateway
    restart: unless-stopped

volumes:
  uitfoodms_db:
    driver: local
  uitfoodms_redis:
    driver: local
  uitfoodms_notification_redis:
    driver: local
  uitfoodms_rabbitmq:
    driver: local
  api_nm_root:
  api_nm_app:
  web_nm_root:
  web_nm_app:
  admin_nm_root:
  admin_nm_app:
  media_nm_root:
  media_nm_app:
  identity_nm_root:
  identity_nm_app:
  notification_nm_root:
  notification_nm_app:
  gateway_nm_root:
  gateway_nm_app:
